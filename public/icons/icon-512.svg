<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#0a0a0a"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#2563eb" stroke-width="6" opacity="0.3"/>
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="180" fill="#2563eb" opacity="0.08"/>
  <!-- Soccer hexagon pattern hints -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.2"/>
  <!-- LM text - big -->
  <text
    x="256"
    y="220"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="110"
    letter-spacing="6"
    fill="#2563eb"
  >LM</text>
  <!-- LIGA -->
  <text
    x="256"
    y="305"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="40"
    letter-spacing="8"
    fill="#ffffff"
    opacity="0.75"
  >LIGA</text>
  <!-- METRÓPOLE -->
  <text
    x="256"
    y="355"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="600"
    font-size="24"
    letter-spacing="6"
    fill="#ffffff"
    opacity="0.45"
  >METRÓPOLE</text>
  <!-- Bottom accent line -->
  <line x1="176" y1="385" x2="336" y2="385" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
</svg>
